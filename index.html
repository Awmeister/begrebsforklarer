<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Begrebsforklarer</title>
  
  <!-- Tailwind CSS til styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel til at oversætte JSX i browseren -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans selection:bg-indigo-100 selection:text-indigo-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ====
    // URL til din Cloudflare Worker proxy.
    // Skift denne til din egen Worker-URL fra Cloudflare Dashboard.
    // ====
    const WORKER_URL = 'https://dry-glitter-39d8.awmeister.workers.dev/';

    const KLASSETRIN_LIST = [
      '0.-3. klasse', '4.-6. klasse', '7.-9. klasse', '10. klasse'
    ];

    const FAG_KLASSETRIN_MAP = {
      'Dansk': ['0.-3. klasse', '4.-6. klasse', '7.-9. klasse', '10. klasse'],
      'Matematik': ['0.-3. klasse', '4.-6. klasse', '7.-9. klasse', '10. klasse'],
      'Engelsk': ['0.-3. klasse', '4.-6. klasse', '7.-9. klasse', '10. klasse'],
      'Natur/Teknologi': ['0.-3. klasse', '4.-6. klasse'],
      'Fysik/Kemi': ['7.-9. klasse', '10. klasse'],
      'Biologi': ['7.-9. klasse', '10. klasse'],
      'Geografi': ['7.-9. klasse', '10. klasse'],
      'Historie': ['4.-6. klasse', '7.-9. klasse'],
      'Samfundsfag': ['7.-9. klasse', '10. klasse'],
      'Kristendomskundskab': ['0.-3. klasse', '4.-6. klasse', '7.-9. klasse'],
      'Idræt': ['0.-3. klasse', '4.-6. klasse', '7.-9. klasse', '10. klasse'],
      'Håndværk og Design': ['4.-6. klasse', '7.-9. klasse'],
      'Madkundskab': ['4.-6. klasse', '7.-9. klasse'],
      'Billedkunst': ['0.-3. klasse', '4.-6. klasse'],
      'Musik': ['0.-3. klasse', '4.-6. klasse'],
      'Tysk': ['4.-6. klasse', '7.-9. klasse', '10. klasse'],
      'Fransk': ['4.-6. klasse', '7.-9. klasse', '10. klasse']
    };

    const FAG_LIST = Object.keys(FAG_KLASSETRIN_MAP);

    function App() {
      const [begreb, setBegreb] = useState('');
      const [fag, setFag] = useState(FAG_LIST[0]);
      const [klassetrin, setKlassetrin] = useState(FAG_KLASSETRIN_MAP[FAG_LIST[0]][0]);
      
      const [isLoading, setIsLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState('');

      const [history, setHistory] = useState(() => {
        const saved = localStorage.getItem('begrebsforklarer_history');
        return saved ? JSON.parse(saved) : [];
      });
      const [searchQuery, setSearchQuery] = useState('');

      useEffect(() => {
        localStorage.setItem('begrebsforklarer_history', JSON.stringify(history));
      }, [history]);

      useEffect(() => {
        const availableKlassetrin = FAG_KLASSETRIN_MAP[fag];
        if (!availableKlassetrin.includes(klassetrin)) {
          setKlassetrin(availableKlassetrin[0]);
        }
      }, [fag]);

      const addToHistory = (term) => {
        setHistory(prev => {
          const filtered = prev.filter(item => item.toLowerCase() !== term.toLowerCase());
          return [term, ...filtered].slice(0, 50);
        });
      };

      const clearHistory = () => {
        if (window.confirm('Er du sikker på, at du vil rydde hele historikken?')) {
          setHistory([]);
          setSearchQuery('');
        }
      };

      const filteredHistory = history.filter(item => 
        item.toLowerCase().includes(searchQuery.toLowerCase())
      );

      const generateExplanation = async (termToExplain) => {
        if (!termToExplain.trim()) return;

        setIsLoading(true);
        setError('');
        setResult(null);
        
        try {
          const response = await fetch(WORKER_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              contents: [{
                parts: [{
                  text: `Forklar venligst følgende begreb: "${termToExplain}". Faget er: "${fag}". Målgruppen er en elev i: "${klassetrin}".`
                }]
              }],
              systemInstruction: {
                parts: [{
                  text: "Du er en dygtig og pædagogisk dansk skolelærer. Din opgave er at forklare faglige begreber for elever i folkeskolen på en letforståelig måde. Svaret skal være skrevet i et sprog og med eksempler, der passer præcist til det angivne klassetrin og fag."
                }]
              },
              generationConfig: {
                responseMimeType: "application/json",
                responseSchema: {
                  type: "OBJECT",
                  properties: {
                    forklaring: { type: "STRING", description: "En letforståelig begrebsforklaring tilpasset klassetrinnet." },
                    eksempel: { type: "STRING", description: "Et konkret eksempel på anvendelse af begrebet." },
                    analogi: { type: "STRING", description: "En pædagogisk analogi, der gør begrebet lettere at forstå." },
                    vigtighed: { type: "STRING", description: "En kort forklaring af, hvorfor det er vigtigt at kunne dette begreb." }
                  },
                  required: ["forklaring", "eksempel", "analogi", "vigtighed"]
                }
              }
            })
          });

          const data = await response.json();

          if (data.error) {
            throw new Error(data.error.message);
          }

          if (data.candidates && data.candidates[0].content.parts[0].text) {
            const parsedResult = JSON.parse(data.candidates[0].content.parts[0].text);
            setResult(parsedResult);
            addToHistory(termToExplain);
          } else {
            setError('Kunne ikke generere et svar. Prøv igen.');
          }
        } catch (err) {
          console.error(err);
          setError('Der opstod en fejl: ' + err.message);
        } finally {
          setIsLoading(false);
        }
      };

      const handleGenerate = async (e) => {
        e.preventDefault();
        await generateExplanation(begreb);
      };

      const handleHistoryClick = (term) => {
        setBegreb(term);
        generateExplanation(term);
      };

      const availableKlassetrinForFag = FAG_KLASSETRIN_MAP[fag] || KLASSETRIN_LIST;

      return (
        <div className="min-h-screen bg-slate-50 text-slate-900 font-sans selection:bg-indigo-100 selection:text-indigo-900">
          <div className="max-w-6xl mx-auto px-4 py-12 sm:px-6 lg:px-8">
            
            {/* Header */}
            <div className="text-center mb-12">
              <div className="inline-flex items-center justify-center p-3 bg-indigo-100 rounded-2xl mb-4 text-indigo-600 text-2xl">
                ✨
              </div>
              <h1 className="text-4xl font-bold tracking-tight text-slate-900 sm:text-5xl mb-4">
                Begrebsforklarer
              </h1>
              <p className="text-lg text-slate-600 max-w-2xl mx-auto">
                Få faglige begreber gjort lette at forstå med pædagogiske forklaringer, eksempler og analogier. Og forstå hvorfor begrebet er vigtigt at forstå.
              </p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
              
              {/* Left Column: Form & History */}
              <div className="lg:col-span-4 space-y-6">
                
                {/* Form Section */}
                <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                  <form onSubmit={handleGenerate} className="space-y-5">
                    
                    <div>
                    <label htmlFor="begreb" className="block text-sm font-semibold text-slate-900 mb-2">
                    Begreb eller sætning
                    </label>
                    <input
                    type="text"
                    id="begreb"
                    value={begreb}
                    onChange={(e) => setBegreb(e.target.value)}
                    placeholder="F.eks. Fotosyntese, Demokrati..."
                    className="w-full px-4 py-3 rounded-xl border border-slate-300 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
                    required
                    />
                    </div>

                    <div>
                    <label htmlFor="fag" className="block text-sm font-semibold text-slate-900 mb-2">
                    Fag
                    </label>
                    <div className="relative">
                    <select
                    id="fag"
                    value={fag}
                    onChange={(e) => setFag(e.target.value)}
                    className="w-full px-4 py-3 rounded-xl border border-slate-300 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 appearance-none transition-colors"
                    >
                    {FAG_LIST.map(f => (
                    <option key={f} value={f}>{f}</option>
                    ))}
                    </select>
                    <span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">📚</span>
                    </div>
                    </div>

                    <div>
                    <label htmlFor="klassetrin" className="block text-sm font-semibold text-slate-900 mb-2">
                    Klassetrin
                    </label>
                    <div className="relative">
                    <select
                    id="klassetrin"
                    value={klassetrin}
                    onChange={(e) => setKlassetrin(e.target.value)}
                    className="w-full px-4 py-3 rounded-xl border border-slate-300 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 appearance-none transition-colors"
                    >
                    {availableKlassetrinForFag.map(k => (
                    <option key={k} value={k}>{k}</option>
                    ))}
                    </select>
                    <span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">🎓</span>
                    </div>
                    </div>

                    <button
                    type="submit"
                    disabled={isLoading || !begreb.trim()}
                    className="w-full py-3 px-4 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold shadow-sm transition-all focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-70 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                    >
                    {isLoading ? (
                    <>⏳ Genererer...</>
                    ) : (
                    <>✨ Forklar begreb</>
                    )}
                    </button>
                  </form>
                </div>

                {/* History Section */}
                <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 flex flex-col max-h-[500px]">
                  <div className="flex items-center justify-between mb-4">
                    <h3 className="text-lg font-bold text-slate-900 flex items-center gap-2">
                    ⏱️ Tidligere begreber
                    </h3>
                    {history.length > 0 && (
                    <button 
                    onClick={clearHistory}
                    className="text-slate-400 hover:text-red-500 transition-colors p-1 rounded-md hover:bg-red-50"
                    title="Ryd historik"
                    >
                    🗑️
                    </button>
                    )}
                  </div>

                  {history.length > 0 ? (
                    <>
                    <div className="relative mb-4">
                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">🔍</span>
                    <input
                    type="text"
                    placeholder="Søg i historik..."
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    className="w-full pl-9 pr-4 py-2 text-sm rounded-lg border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
                    />
                    </div>
                    
                    <div className="overflow-y-auto pr-2 space-y-2 flex-grow">
                    {filteredHistory.length > 0 ? (
                    filteredHistory.map((item, idx) => (
                    <button
                    key={idx}
                    onClick={() => handleHistoryClick(item)}
                    className="w-full text-left px-4 py-3 rounded-xl border border-slate-100 bg-slate-50 hover:bg-indigo-50 hover:border-indigo-100 hover:text-indigo-700 transition-colors flex items-center justify-between group"
                    >
                    <span className="font-medium truncate pr-2">{item}</span>
                    <span className="text-slate-300 group-hover:text-indigo-400 shrink-0">➡️</span>
                    </button>
                    ))
                    ) : (
                    <p className="text-sm text-slate-500 text-center py-4">Ingen resultater fundet.</p>
                    )}
                    </div>
                    </>
                  ) : (
                    <div className="text-center py-8 text-slate-500">
                    <p className="text-sm">Du har ikke søgt på nogen begreber endnu.</p>
                    </div>
                  )}
                </div>
              </div>

              {/* Right Column: Result Section */}
              <div className="lg:col-span-8">
                {error && (
                  <div className="bg-red-50 text-red-700 p-4 rounded-2xl border border-red-200 mb-6">
                    {error}
                  </div>
                )}

                {!result && !isLoading && !error && (
                  <div className="h-full min-h-[400px] bg-white rounded-3xl border border-slate-200 border-dashed flex flex-col items-center justify-center p-8 text-center text-slate-500">
                    <div className="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mb-4 text-3xl">
                    📖
                    </div>
                    <h3 className="text-lg font-medium text-slate-900 mb-2">Klar til at forklare</h3>
                    <p className="max-w-sm">
                    Indtast et begreb, vælg fag og klassetrin, og få en skræddersyet pædagogisk forklaring.
                    </p>
                  </div>
                )}

                {isLoading && (
                  <div className="h-full min-h-[400px] bg-white rounded-3xl border border-slate-200 flex flex-col items-center justify-center p-8 text-center">
                    <div className="text-4xl animate-spin mb-4">⏳</div>
                    <h3 className="text-lg font-medium text-slate-900 mb-2">Tænker...</h3>
                    <p className="text-slate-500">Forbereder den bedste forklaring til {klassetrin}...</p>
                  </div>
                )}

                {result && !isLoading && (
                  <div className="space-y-6">
                    
                    {/* Forklaring */}
                    <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 sm:p-8 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-2 h-full bg-blue-500"></div>
                    <div className="flex items-start gap-4">
                    <div className="p-3 bg-blue-50 text-blue-600 rounded-xl shrink-0 text-xl">
                    📖
                    </div>
                    <div>
                    <h3 className="text-lg font-bold text-slate-900 mb-2">Begrebsforklaring</h3>
                    <p className="text-slate-700 leading-relaxed">{result.forklaring}</p>
                    </div>
                    </div>
                    </div>

                    {/* Eksempel */}
                    <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 sm:p-8 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-2 h-full bg-emerald-500"></div>
                    <div className="flex items-start gap-4">
                    <div className="p-3 bg-emerald-50 text-emerald-600 rounded-xl shrink-0 text-xl">
                    💡
                    </div>
                    <div>
                    <h3 className="text-lg font-bold text-slate-900 mb-2">Eksempel</h3>
                    <p className="text-slate-700 leading-relaxed">{result.eksempel}</p>
                    </div>
                    </div>
                    </div>

                    {/* Analogi */}
                    <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 sm:p-8 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-2 h-full bg-amber-500"></div>
                    <div className="flex items-start gap-4">
                    <div className="p-3 bg-amber-50 text-amber-600 rounded-xl shrink-0 text-xl">
                    🔄
                    </div>
                    <div>
                    <h3 className="text-lg font-bold text-slate-900 mb-2">Analogi</h3>
                    <p className="text-slate-700 leading-relaxed">{result.analogi}</p>
                    </div>
                    </div>
                    </div>

                    {/* Vigtighed */}
                    <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 sm:p-8 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-2 h-full bg-purple-500"></div>
                    <div className="flex items-start gap-4">
                    <div className="p-3 bg-purple-50 text-purple-600 rounded-xl shrink-0 text-xl">
                    🎯
                    </div>
                    <div>
                    <h3 className="text-lg font-bold text-slate-900 mb-2">Hvorfor er det vigtigt?</h3>
                    <p className="text-slate-700 leading-relaxed">{result.vigtighed}</p>
                    </div>
                    </div>
                    </div>

                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
